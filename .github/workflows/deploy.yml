name: Build and Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          check-latest: true
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment directory
        run: |
          ssh -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            if [ ! -d "${{ secrets.VPS_DEPLOY_PATH }}" ]; then
              sudo mkdir -p "${{ secrets.VPS_DEPLOY_PATH }}"
              sudo chown -R $USER:$USER "${{ secrets.VPS_DEPLOY_PATH }}"
            fi
          EOF

      - name: Deploy to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.VPS_PORT || 22 }}" \
            dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/

      - name: Set directory permissions
        run: |
          ssh -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            sudo chown -R www-data:www-data "${{ secrets.VPS_DEPLOY_PATH }}" || sudo chown -R $USER:$USER "${{ secrets.VPS_DEPLOY_PATH }}"
            sudo chmod -R 755 "${{ secrets.VPS_DEPLOY_PATH }}"
          EOF

      - name: Verify deployment
        run: |
          curl -I --retry 3 --retry-connrefused --max-time 15 https://resume.begodev.io
